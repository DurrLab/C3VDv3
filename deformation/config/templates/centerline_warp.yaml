geometry: c0_transverse_t3_v2
reference_dir: /path/to/c0_transverse_t3_v2
centerline_path: /path/to/c0_transverse_t3_v2.npy
output_root: /path/to/output_root

enable_gaussian: false
enable_centerline_warp: true

# Choose one of: shift, linear_shift, warp, exp_tail_warp

# --- Shift ---
# transform_mode: shift
# transform_params:
#   direction: [0, 1, 0]  # or "auto" for PCA dominant transverse axis
#   distance: 5.0         # displacement amount in units

# --- Linear Shift ---
# transform_mode: linear_shift
# transform_params:
#   direction: [0, 1, 0]  # or "auto"
#   distance: 5.0
#   fixed_end: "start"    # or "end" - which end stays fixed

# --- Warp ---
# transform_mode: warp
# transform_params:
#   amplitude: 8.0        # peak displacement
#   phase: 0.0            # initial phase offset
#   axis: [0, 1, 0]       # or "auto" for PCA dominant transverse axis

# --- Exp TailWarp ---
# transform_mode: exp_tail_warp
# transform_params:
#   amplitude: 8.0        # peak displacement
#   axis: [0, 1, 0]       # or "auto"
#   sharpness: 5.0        # exponential curve steepness
#   start_fraction: 0.05  # where warp begins (0.0-1.0 along centerline)

# Active Config
transform_mode: warp
transform_params:
  amplitude: 8.0
  axis: auto
  phase: 0.0

fps: 30
save_new_centerline: true
debug_vertex_bounds: false

# Mesh processing parameters (optional, defaults shown)
taubin_iterations: 12
subdivision_iterations: 0

# Vertex smoothing parameters (optional, defaults shown)
smooth_vertex_s: true
vertex_s_smooth_iterations: 24
vertex_s_smooth_lambda: 0.55
