geometry: c0_transverse_t3_v2
reference_dir: /path/to/c0_transverse_t3_v2
centerline_path: /path/to/c0_transverse_t3_v2.npy
output_root: /path/to/output_root
enable_gaussian: true
enable_centerline_warp: false

waves:
  - A: 0.6
    sigma_frac: 0.10
    velocity_cm_s: 2.0
    start_delay_s: 0.0
  - A: 0.4
    sigma_frac: 0.08
    velocity_cm_s: 2.0
    start_delay_s: 1.2

fps: 29.97
debug_vertex_bounds: false

# Mesh processing parameters (optional, defaults shown)
taubin_iterations: 12
subdivision_iterations: 0

# Vertex smoothing parameters (optional, defaults shown)
smooth_vertex_s: true
vertex_s_smooth_iterations: 12
vertex_s_smooth_lambda: 0.45
